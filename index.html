<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    font-family: Arial;
    text-align: center;
    margin-top: 40px;
}
#reader{
    width:300px;
    margin:auto;
}
#resultado{
    margin-top:20px;
    font-weight:bold;
}
button{
    margin-top:10px;
    padding:10px;
    font-size:16px;
    cursor:pointer;
}
</style>

</head>

<body>

<h2>Escáner QR</h2>

<div id="reader"></div>
<p id="resultado">Esperando escaneo...</p>

<script>

let escaneado = false;

function onScanSuccess(text){
    if(escaneado) return;
    escaneado = true;

    let resultado = document.getElementById("resultado");

    resultado.innerHTML = "Código: " + text;

    scanner.clear();

    // Si es enlace, mostrar botón
    if(text.startsWith("http")){
        resultado.innerHTML += "<br><br><button onclick='abrirLink(\"" + text + "\")'>Abrir enlace</button>";
    }
}

function abrirLink(url){
    window.open(url, "_blank");
}

let scanner = new Html5QrcodeScanner("reader", { fps:10, qrbox:250 });

scanner.render(onScanSuccess);

</script>

</body>
</html>
